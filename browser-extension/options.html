<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Giftly Save Settings</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <p class="eyebrow">Giftly Save</p>
      <h1>Settings</h1>

      <label for="app-base-url" style="display:block;margin-top:16px;font-size:13px;color:#5b4f45;">
        Giftly base URL
      </label>
      <input
        id="app-base-url"
        type="url"
        placeholder="https://wishlist-1-6omc.onrender.com"
        style="width:100%;margin-top:8px;padding:10px 12px;border-radius:12px;border:1px solid #d7cbbf;font:inherit;"
      />

      <p style="margin:10px 0 0;font-size:12px;line-height:1.5;color:#7a695b;">
        Default target: https://wishlist-1-6omc.onrender.com
      </p>

      <button id="save-settings" class="primary" type="button">Save</button>
      <div id="save-status" class="message hidden" style="margin-top:12px;"></div>
    </main>

    <script src="options.js"></script>
  </body>
  </html>
