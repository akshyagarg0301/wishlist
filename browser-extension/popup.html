<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Giftly Save</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <div class="header">
        <div>
          <p class="eyebrow">Giftly Save</p>
          <h1>Add Product</h1>
        </div>
        <button id="open-options" class="ghost" type="button">Settings</button>
      </div>

      <div id="state-message" class="message">Checking this page…</div>

      <section id="product-card" class="card hidden">
        <img id="product-image" alt="" class="product-image hidden" />
        <div class="product-copy">
          <h2 id="product-title"></h2>
          <p id="product-description"></p>
        </div>
      </section>

      <button id="save-button" class="primary hidden" type="button">Open Giftly Import</button>
    </main>

    <script src="popup.js"></script>
  </body>
  </html>
